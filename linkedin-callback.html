<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... | STIF</title>
    
    <!-- STIF Fonts: Roboto with Montserrat fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .callback-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-50) 0%, white 100%);
            padding: var(--space-6);
        }
        .callback-card {
            text-align: center;
            padding: var(--space-10);
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            max-width: 400px;
        }
        .callback-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-6);
            background: var(--primary-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-600);
        }
        .callback-error {
            color: var(--error);
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <div class="callback-container">
        <div class="callback-card" id="loading-state">
            <div class="callback-icon">
                <div class="loading-spinner"></div>
            </div>
            <h2>Completing Sign In</h2>
            <p class="text-secondary" id="loading-message">Please wait while we verify your credentials...</p>
        </div>

        <div class="callback-card hidden" id="error-state">
            <div class="callback-icon" style="background: var(--error-bg); color: var(--error);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <h2>Authentication Failed</h2>
            <p class="text-secondary" id="error-message">Something went wrong during sign in.</p>
            <a href="/champion-login.html" class="btn btn-primary mt-6">Try Again</a>
        </div>

        <div class="callback-card hidden" id="success-state">
            <div class="callback-icon" style="background: var(--success-bg); color: var(--success);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2>Sign In Successful</h2>
            <p class="text-secondary" id="success-message">Redirecting to your dashboard...</p>
        </div>
    </div>

    <script src="supabase-service.js"></script>
    <script src="business-auth.js"></script>
    <script src="champion-auth-supabase.js"></script>
    
    <script>
        /**
         * Enhanced LinkedIn OAuth Callback Handler
         * 
         * FIX: Properly handles profile completion for LinkedIn users
         * - Checks login context (champion vs business)
         * - Ensures profile metadata is populated from LinkedIn
         * - Verifies profile completion before redirecting to dashboard
         * - Redirects to profile page if required fields are missing
         */
        async function handleCallback() {
            const loadingState = document.getElementById('loading-state');
            const loadingMessage = document.getElementById('loading-message');
            const errorState = document.getElementById('error-state');
            const successState = document.getElementById('success-state');
            const successMessage = document.getElementById('success-message');
            const errorMessage = document.getElementById('error-message');

            try {
                // Step 1: Wait for services to be ready
                loadingMessage.textContent = 'Initializing authentication...';
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Step 2: Check login context (champion vs business)
                const loginContext = localStorage.getItem('login_context');
                console.log('Login context:', loginContext);
                
                // Step 3: Initialize appropriate auth service
                if (loginContext === 'business') {
                    // Handle business user flow
                    if (!window.businessAuth) {
                        throw new Error('Business authentication not available');
                    }
                    await window.businessAuth.init();
                    const session = await window.supabaseService.getSession();
                    
                    if (session) {
                        loadingState.classList.add('hidden');
                        successState.classList.remove('hidden');
                        successMessage.textContent = 'Redirecting to business dashboard...';
                        
                        setTimeout(() => {
                            window.location.href = '/business-dashboard.html';
                        }, 1500);
                        return;
                    }
                } else {
                    // Handle champion user flow (default)
                    loadingMessage.textContent = 'Loading your profile...';
                    await window.championAuth.init();
                    
                    // Step 4: Check if we have a session
                    const session = await window.supabaseService.getSession();
                    
                    if (!session) {
                        throw new Error('No session found. Please try signing in again.');
                    }
                    
                    console.log('Session found, user:', session.user?.email);
                    
                    // Step 5: Load or create champion profile
                    loadingMessage.textContent = 'Setting up your profile...';
                    await window.championAuth.loadChampionProfile();
                    
                    const champion = window.championAuth.getChampion();
                    console.log('Champion profile loaded:', champion);
                    
                    if (!champion) {
                        throw new Error('Failed to load profile. Please try again.');
                    }
                    
                    // Step 6: Check if profile is complete
                    const profileStatus = window.championAuth.getProfileCompletionStatus();
                    console.log('Profile completion status:', profileStatus);
                    
                    if (!profileStatus.isComplete) {
                        // FIX: Profile is incomplete - redirect to profile page
                        // This prevents the red border bug by ensuring LinkedIn users complete their profile
                        console.log('Profile incomplete, redirecting to profile page');
                        
                        loadingState.classList.add('hidden');
                        successState.classList.remove('hidden');
                        successMessage.textContent = 'Please complete your profile...';
                        
                        // Store that we came from LinkedIn login
                        sessionStorage.setItem('linkedin_login', 'true');
                        
                        setTimeout(() => {
                            // Redirect to profile page with completion mode
                            window.location.href = '/champion-profile.html?complete=true';
                        }, 1000);
                        return;
                    }
                    
                    // Step 7: Profile is complete - redirect to dashboard
                    console.log('Profile complete, redirecting to dashboard');
                    
                    loadingState.classList.add('hidden');
                    successState.classList.remove('hidden');
                    successMessage.textContent = 'Redirecting to your dashboard...';
                    
                    setTimeout(() => {
                        window.location.href = '/champion-dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('Callback error:', error);
                
                // Hide loading state
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
                
                // Provide helpful error messages
                let userMessage = 'Authentication failed. Please try again.';
                
                if (error.message?.includes('session')) {
                    userMessage = 'Could not establish your session. Please sign in again.';
                } else if (error.message?.includes('profile')) {
                    userMessage = 'Could not load your profile. Please try signing in again.';
                } else if (error.message?.includes('network')) {
                    userMessage = 'Network error. Please check your connection and try again.';
                } else if (error.message) {
                    userMessage = error.message;
                }
                
                errorMessage.textContent = userMessage;
            }
        }

        // Handle the OAuth callback
        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
