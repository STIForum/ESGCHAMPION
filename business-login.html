<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Business Login - STIF SME Portal">
    <title>Login | STIF - Sustainability Technology and Innovation Forum</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .auth-page {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(70px + var(--space-8)) var(--space-6) var(--space-8);
            background: linear-gradient(135deg, var(--primary-50) 0%, white 50%, var(--gray-50) 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: var(--space-10);
        }
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        .auth-icon {
            width: 64px;
            height: 64px;
            background: var(--primary-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-4);
            color: var(--primary);
        }
        .auth-title {
            font-size: var(--text-2xl);
            margin-bottom: var(--space-2);
        }
        .auth-subtitle {
            color: var(--gray-500);
            font-size: var(--text-sm);
        }
        .forgot-link {
            display: block;
            text-align: right;
            font-size: var(--text-sm);
            color: var(--primary);
            text-decoration: none;
            margin-bottom: var(--space-6);
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin: var(--space-6) 0;
            color: var(--gray-400);
            font-size: var(--text-sm);
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }
        .auth-footer {
            text-align: center;
            margin-top: var(--space-6);
        }
        .auth-footer p {
            color: var(--gray-500);
            font-size: var(--text-sm);
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper .form-input {
            width: 100%;
            padding-right: 2.75rem;
        }
        .password-toggle {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-400);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .password-toggle:hover {
            color: var(--gray-600);
        }
        .error-message {
            background: var(--error-100);
            border: 1px solid var(--error);
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-4);
            color: var(--error);
            font-size: var(--text-sm);
            display: none;
        }
        .error-message.show { display: block; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/landing.html" class="logo">
                <img src="assets/images/logo1.png" alt="STIF Logo" class="logo-img">
                <span class="logo-text">Sustainability Technology and Innovation Forum</span>
            </a>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/landing.html" class="nav-link">Home</a></li>
                    <li><a href="/about.html" class="nav-link">About</a></li>
                    <li><a href="/faq.html" class="nav-link">FAQ</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="/business-register.html" class="btn btn-primary">Register</a>
            </div>
            <button class="mobile-menu-toggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu">
        <button class="mobile-menu-close">&times;</button>
        <ul class="mobile-nav-menu">
            <li><a href="/landing.html" class="mobile-nav-link">Home</a></li>
            <li><a href="/about.html" class="mobile-nav-link">About</a></li>
            <li><a href="/faq.html" class="mobile-nav-link">FAQ</a></li>
            <li><a href="/business-register.html" class="mobile-nav-link">Register</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5m-4 0h4"></path>
                    </svg>
                </div>
                <h1 class="auth-title">Business Login</h1>
                <p class="auth-subtitle">Access your SME sustainability portal</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your@company.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                            <!-- Eye icon (shown when password is hidden) -->
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye-off icon (shown when password is visible) -->
                            <svg id="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
                
                <button type="submit" class="btn btn-primary w-full" id="login-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Sign In
                </button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/business-register.html">Create one</a></p>
                <p style="margin-top: var(--space-3);">Want to be a Champion? <a href="/champion-login.html">Login as Champion</a></p>
            </div>
        </div>
    </main>

    <script src="supabase-service.js"></script>
    <script src="business-auth.js"></script>
    <script src="mobile-menu.js"></script>
    <script>
        function getFriendlyAuthError(error) {
            const msg = (error?.message || '').toLowerCase();
            const code = error?.code || error?.status || '';

            if (msg.includes('invalid login credentials') || code === 'invalid_credentials') {
                return 'Invalid email or password. Please check your details and try again.';
            }
            if (msg.includes('email not confirmed')) {
                return 'Please verify your email address before signing in.';
            }
            if (msg.includes('too many requests')) {
                return 'Too many attempts. Please wait a minute and try again.';
            }
            return error?.message || 'Login failed. Please try again.';
        }

        // BUG_LOGIN_001: Password visibility toggle
        document.getElementById('password-toggle').addEventListener('click', function () {
            const input      = document.getElementById('password');
            const eyeIcon    = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');
            const isHidden   = input.type === 'password';

            input.type           = isHidden ? 'text' : 'password';
            eyeIcon.style.display    = isHidden ? 'none'  : 'block';
            eyeOffIcon.style.display = isHidden ? 'block' : 'none';
            this.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const loginBtn = document.getElementById('login-btn');
        const errorEl = document.getElementById('error-message');
        
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading-spinner-sm"></span> Signing in...';
        errorEl.classList.remove('show');
        
        try {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            const result = await window.businessAuth.login(email, password);
            
            if (result.success) {
                window.location.href = '/business-dashboard.html';
            } else {
                errorEl.textContent = result.error;
                errorEl.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        } catch (error) {
            errorEl.textContent = error.message;
            errorEl.classList.add('show');
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Sign In';
        }
    });
    </script>
</body>
</html>
